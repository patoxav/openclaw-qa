<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Ejecutivo QA</title>
  <style>
    :root {
      --ok: #1f883d;
      --warn: #9a6700;
      --bad: #cf222e;
      --bg: #f6f8fa;
      --card: #ffffff;
      --text: #1f2328;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1080px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .status {
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 14px;
    }
    .label {
      font-size: 12px;
      color: #57606a;
      margin-bottom: 6px;
    }
    .value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid #d0d7de;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      border-bottom: 1px solid #d8dee4;
      padding: 10px 12px;
      font-size: 14px;
      vertical-align: top;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }
    .small {
      color: #57606a;
      font-size: 12px;
      margin-top: 8px;
    }
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 style="margin:0;">Dashboard Ejecutivo QA</h1>
        <div class="small" id="last-update">Actualizando…</div>
      </div>
      <div id="release-status" class="status">Cargando…</div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Ejecuciones</div>
        <div class="value" id="runs">0</div>
      </div>
      <div class="card">
        <div class="label">Total tests (última ejecución)</div>
        <div class="value" id="total">0</div>
      </div>
      <div class="card">
        <div class="label">Passed (última ejecución)</div>
        <div class="value" id="passed">0</div>
      </div>
      <div class="card">
        <div class="label">Failed (última ejecución)</div>
        <div class="value" id="failed">0</div>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Fecha</th>
          <th>Estado</th>
          <th>Resumen</th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr>
          <td colspan="4">Sin datos todavía.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const REFRESH_INTERVAL_MS = 5000;

    function getExecutiveStatus(run) {
      if (!run) return { text: 'SIN DATOS', color: '#6e7781' };
      if (run.failed > 0) return { text: 'ROJO', color: '#cf222e' };
      if (run.total === 0) return { text: 'AMARILLO', color: '#9a6700' };
      return { text: 'VERDE', color: '#1f883d' };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function renderHistory(history) {
      const body = document.getElementById('history-body');
      if (!history.length) {
        body.innerHTML = '<tr><td colspan="4">Sin datos todavía.</td></tr>';
        return;
      }

      const rows = [...history].reverse().slice(0, 15).map((run) => {
        const summary = `${run.passed ?? 0} passed / ${run.failed ?? 0} failed`;
        return `<tr>
          <td class="mono">${escapeHtml(run.id ?? '')}</td>
          <td>${escapeHtml(run.timestamp ?? '')}</td>
          <td>${escapeHtml(run.status ?? '')}</td>
          <td>${escapeHtml(summary)}</td>
        </tr>`;
      });

      body.innerHTML = rows.join('');
    }

    async function refresh() {
      try {
        const response = await fetch(`qa-results.json?t=${Date.now()}`);
        const history = response.ok ? await response.json() : [];
        const runs = Array.isArray(history) ? history : [];
        const latest = runs[runs.length - 1];
        const executive = getExecutiveStatus(latest);

        document.getElementById('runs').textContent = String(runs.length);
        document.getElementById('total').textContent = String(latest?.total ?? 0);
        document.getElementById('passed').textContent = String(latest?.passed ?? 0);
        document.getElementById('failed').textContent = String(latest?.failed ?? 0);
        document.getElementById('release-status').textContent = `Estado release: ${executive.text}`;
        document.getElementById('release-status').style.background = executive.color;
        document.getElementById('last-update').textContent = `Última actualización: ${new Date().toLocaleString()}`;
        renderHistory(runs);
      } catch {
        document.getElementById('release-status').textContent = 'Estado release: SIN DATOS';
        document.getElementById('release-status').style.background = '#6e7781';
        document.getElementById('history-body').innerHTML = '<tr><td colspan="4">No se pudo leer qa-results.json</td></tr>';
      }
    }

    refresh();
    setInterval(refresh, REFRESH_INTERVAL_MS);
  </script>
</body>
</html>
